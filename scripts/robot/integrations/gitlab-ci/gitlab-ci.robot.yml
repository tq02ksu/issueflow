stages:
  - robot
  - quality
  - build
  - package
  - deploy
  - release

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

variables:
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: recursive
  ROBOT_RUNTIME_IMAGE: registry.example.com/issueflow/opencode-runtime:latest
  BUILD_RUNTIME_IMAGE: alpine:3.20
  DEPLOY_RUNTIME_IMAGE: alpine:3.20
  ROBOT_JOB_TYPE: ""
  PROJECT_ID: ""
  RESOURCE_TYPE: ""
  RESOURCE_ID: ""
  ISSUE_ID: ""
  MR_ID: ""
  COMMENT_ID: ""
  TRIGGER_USER: ""
  CORRELATION_ID: ""
  MR_COMPILE_COMMAND: ""
  MR_TEST_COMMAND: ""
  PACKAGE_COMMAND: ""
  PACKAGE_ARTIFACT_PATH: ""
  DEPLOY_COMMAND: ""
  RELEASE_BUILD_COMMAND: ""
  RELEASE_ARTIFACT_PATH: ""
  RELEASE_PUBLISH_COMMAND: ""
  ROBOT_ISSUE_TRIAGE_COMMAND: ""
  ROBOT_ISSUE_VALIDATE_COMMAND: ""
  ROBOT_MR_PLAN_DRAFT_COMMAND: ""
  ROBOT_MR_IMPLEMENT_COMMAND: ""
  ROBOT_MR_VERIFY_COMMAND: ""
  ROBOT_RELEASE_PREPARE_COMMAND: ""
  ROBOT_RELEASE_PUBLISH_COMMAND: ""

.robot_job_template:
  stage: robot
  image: $ROBOT_RUNTIME_IMAGE
  interruptible: true
  script:
    - sh ./scripts/robot/integrations/gitlab-ci/run-job.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - robot-output/
  rules:
    - when: never

.mr_job_template:
  interruptible: true
  image: $BUILD_RUNTIME_IMAGE
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

.default_branch_job_template:
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

.tag_job_template:
  interruptible: true
  rules:
    - if: '$CI_COMMIT_TAG'

issue-triage:
  extends: .robot_job_template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $ROBOT_JOB_TYPE == "issue-triage"'

issue-validate:
  extends: .robot_job_template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $ROBOT_JOB_TYPE == "issue-validate"'

mr-plan-draft:
  extends: .robot_job_template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $ROBOT_JOB_TYPE == "mr-plan-draft"'

mr-implement:
  extends: .robot_job_template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $ROBOT_JOB_TYPE == "mr-implement"'

mr-verify:
  extends: .robot_job_template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $ROBOT_JOB_TYPE == "mr-verify"'

release-prepare:
  extends: .robot_job_template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $ROBOT_JOB_TYPE == "release-prepare"'

release-publish:
  extends: .robot_job_template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $ROBOT_JOB_TYPE == "release-publish"'

mr-compile:
  extends: .mr_job_template
  stage: build
  script:
    - |
      if [ -z "${MR_COMPILE_COMMAND:-}" ]; then
        echo "MR_COMPILE_COMMAND is empty; skipping compile step."
        exit 0
      fi
      sh -c "$MR_COMPILE_COMMAND"

mr-test:
  extends: .mr_job_template
  stage: quality
  script:
    - |
      if [ -z "${MR_TEST_COMMAND:-}" ]; then
        echo "MR_TEST_COMMAND is empty; skipping test step."
        exit 0
      fi
      sh -c "$MR_TEST_COMMAND"

package:
  extends: .default_branch_job_template
  stage: package
  image: $BUILD_RUNTIME_IMAGE
  script:
    - mkdir -p package-output
    - |
      if [ -z "${PACKAGE_COMMAND:-}" ]; then
        echo "PACKAGE_COMMAND is empty; skipping package step."
        exit 0
      fi
      sh -c "$PACKAGE_COMMAND"
    - |
      if [ -n "${PACKAGE_ARTIFACT_PATH:-}" ] && [ -e "$PACKAGE_ARTIFACT_PATH" ]; then
        cp -R "$PACKAGE_ARTIFACT_PATH" package-output/
      fi
  artifacts:
    expire_in: 14 days
    paths:
      - package-output/

deploy-staging:
  extends: .default_branch_job_template
  stage: deploy
  image: $DEPLOY_RUNTIME_IMAGE
  needs:
    - package
  environment:
    name: staging
  when: manual
  script:
    - |
      if [ -z "${DEPLOY_COMMAND:-}" ]; then
        echo "DEPLOY_COMMAND is empty; skipping deploy step."
        exit 0
      fi
      sh -c "$DEPLOY_COMMAND"

release-build:
  extends: .tag_job_template
  stage: release
  image: $BUILD_RUNTIME_IMAGE
  script:
    - mkdir -p release-output
    - |
      if [ -z "${RELEASE_BUILD_COMMAND:-}" ]; then
        echo "RELEASE_BUILD_COMMAND is empty; skipping release build step."
        exit 0
      fi
      sh -c "$RELEASE_BUILD_COMMAND"
    - |
      if [ -n "${RELEASE_ARTIFACT_PATH:-}" ] && [ -e "$RELEASE_ARTIFACT_PATH" ]; then
        cp -R "$RELEASE_ARTIFACT_PATH" release-output/
      fi
  artifacts:
    expire_in: 30 days
    paths:
      - release-output/

release-publish-job:
  extends: .tag_job_template
  stage: release
  image: $DEPLOY_RUNTIME_IMAGE
  needs:
    - release-build
  when: manual
  script:
    - |
      if [ -z "${RELEASE_PUBLISH_COMMAND:-}" ]; then
        echo "RELEASE_PUBLISH_COMMAND is empty; skipping release publish step."
        exit 0
      fi
      sh -c "$RELEASE_PUBLISH_COMMAND"
