name: Release

on:
  push:
    tags: ["v*"]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist/

  binary:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Zig
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary (Linux)
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build release binary (macOS)
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Package archive (Unix)
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/issueflow dist/issueflow
          cp -r web/dist dist/web-dist
          archive_name="issueflow-${RELEASE_VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive_name" -C dist issueflow web-dist
          echo "ARCHIVE_NAME=$archive_name" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}

  publish_binary:
    needs: binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
